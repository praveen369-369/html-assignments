<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Registration Form</title>
</head>
<body>
<form action="https://example.com/register" method="post">
  <label for="fname">First Name:</label>
  <input type="text" id="fname" name="first_name" autofocus><br><br>

  <label for="lname">Last Name:</label>
  <input type="text" id="lname" name="last_name" value="Doe"><br><br>

  <label for="email">Email:</label>
  <input type="email" id="email" name="email"><br><br>

  <label for="pwd">Password:</label>
  <input type="password" id="pwd" name="password"><br><br>

  <button type="submit">Register</button>
  <button type="submit" formaction="https://example.com/alt-register">Register via Alt</button>
</form>
</body>
</html>
